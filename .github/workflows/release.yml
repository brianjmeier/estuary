name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "Estuary ${GITHUB_REF_NAME}" \
              --verify-tag \
              --generate-notes

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build macOS binary
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/estuary-darwin-arm64 ./cmd/estuary

      - name: Upload macOS binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/estuary-darwin-arm64 --clobber

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/estuary-linux-x64 ./cmd/estuary

      - name: Upload Linux binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/estuary-linux-x64 --clobber
